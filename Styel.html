<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Selectors</title>

    <!-- Linking CSS File -->
    <link rel="stylesheet" href="S.css" />
</head>

<body>

    <h1>Hello World</h1>

    <!-- ID Selector -->
    <h1 id="ab">Trophy</h1>

    <!-- Class Selector -->
    <h1 class="boy">Rushikesh</h1>
    <h1 class="girl">Arpita</h1>
    <h1 class="boy">Aryan</h1>
    <h1 class="girl">Sakshi</h1>
    <h1 class="boy">Yash</h1>
    <h1 class="girl">Kanishka</h1>

    <!-- Span -->
    <span id="ab2">Shubham</span>
    <span>Devashish</span>

    <!-- Group Selector -->
    <h3>Adarsh</h3>
    <h4>Hanish</h4>
    <h5>Gourav</h5>
    <h6>Shriyansh</h6>

    <!-- Child Selector -->
    <div>

        <p>Direct Child</p>

        <section>
            <p>Not Direct Child</p>
        </section>

    </div>

</body>
</html>
