<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureConnect Dashboard</title>

<link rel="stylesheet" href="ChatInterface.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            SecureConnect
        </div>

        <ul>

            <li class="active">
                <i class="fa-solid fa-comment"></i>
                Chats
            </li>

            <li>
                <i class="fa-solid fa-users"></i>
                Groups
            </li>

            <li>
                <i class="fa-solid fa-phone"></i>
                Calls
            </li>

            <li>
                <i class="fa-solid fa-bell"></i>
                Notifications
            </li>

            <li>
                <i class="fa-solid fa-bookmark"></i>
                Saved
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                Settings
            </li>

        </ul>

    </div>

    <!-- Chat List -->

    <div class="chat-list">

        <div class="search">
            <input type="text" placeholder="Search chats...">
        </div>

        <div class="chat-item active-chat">
            <img src="4.jpeg">
            <div>
                <h4>Vishal</h4>
                <p>Hii</p>
            </div>
        </div>

        <div class="chat-item">
            <img src="1.jpeg">
            <div>
                <h4>Vivek Bhaiya</h4>
                <p>Call at 5 PM</p>
            </div>
        </div>

        <div class="chat-item">
            <img src="2.jpeg">
            <div>
                <h4>Muskan</h4>
                <p>File Uploaded</p>
            </div>
        </div>

    </div>

    <!-- Chat Window -->

    <div class="chat-window">

        <div class="chat-header">

            <div class="user-info">
                <img src="3.jpeg">
                <div>
                    <h3>Vidit Jaat</h3>
                    <span>Online</span>
                </div>
            </div>

            <div class="header-icons">
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-circle-info"></i>
            </div>

        </div>

        <div class="messages">

            <div class="message received">
                Hey Akash 👋
            </div>

            <div class="message sent">
                Hlw Vidit
            </div>

            <div class="message received">
                Kaha ho
            </div>

            <div class="message sent">
                New York....
            </div>


        </div>

        <div class="chat-input">

            <i class="fa-regular fa-face-smile"></i>

            <input type="text"
            placeholder="Type a message...">

            <i class="fa-solid fa-paperclip"></i>

            <button>
                <i class="fa-solid fa-paper-plane"></i>
            </button>

        </div>

    </div>

</div>

</body>
</html>
