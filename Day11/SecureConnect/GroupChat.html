<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureConnect Group Chat</title>

<link rel="stylesheet" href="GroupChat.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Left Panel -->

    <div class="group-info">

        <div class="group-header">
            <img src="6.jpeg" alt="">
            <h2>Design Team</h2>
            <p>4 Members • 2 Online</p>
        </div>

        <div class="members">

            <h3>Members</h3>

            <div class="member">
                <img src="1.jpeg">
                <span>Vivek Bhaiya</span>
            </div>

            <div class="member">
                <img src="2.jpeg">
                <span>Muskan</span>
            </div>

            <div class="member">
                <img src="3.jpeg">
                <span>Vidit</span>
            </div>

            <div class="member">
                <img src="4.jpeg">
                <span>Akash</span>
            </div>

        </div>

    </div>

    <!-- Chat Section -->

    <div class="chat-section">

        <div class="chat-header">

            <h2># Design Team</h2>

            <div class="icons">
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-users"></i>
            </div>

        </div>

        <!-- Messages -->

        <div class="messages">

            <!-- Vivek -->

            <div class="chat-row">

                <img src="1.jpeg" class="msg-dp">

                <div class="chat-content">

                    <span class="sender-name">
                        Vivek Bhaiya
                    </span>

                    <div class="message received">
                        Can we finalize the UI today?
                    </div>

                </div>

            </div>

            <!-- Akash -->

            <div class="chat-row right">

                <div class="chat-content">

                    <span class="sender-name sender-right">
                        Akash
                    </span>

                    <div class="message sent">
                        Yes, I will complete it today.
                    </div>

                </div>

                <img src="4.jpeg" class="msg-dp">

            </div>

            <!-- Muskan -->

            <div class="chat-row">

                <img src="2.jpeg" class="msg-dp">

                <div class="chat-content">

                    <span class="sender-name">
                        Muskan
                    </span>

                    <div class="message received">
                        Great 👍
                    </div>

                </div>

            </div>

            <!-- Vidit -->

            <div class="chat-row">

                <img src="3.jpeg" class="msg-dp">

                <div class="chat-content">

                    <span class="sender-name">
                        Vidit
                    </span>

                    <div class="message received">
                        Login page is completed.
                    </div>

                </div>

            </div>

        </div>

        <!-- Input -->

        <div class="chat-input">

            <input
            type="text"
            placeholder="Type a message...">

            <button>
                <i class="fa-solid fa-paper-plane"></i>
            </button>

        </div>

    </div>

    <!-- Right Panel -->

    <div class="media-panel">

        <h3>Shared Files</h3>

        <div class="file">UI-Design.pdf</div>

        <div class="file">Report.docx</div>

        <div class="file">Presentation.pptx</div>

    </div>

</div>

</body>
</html>
