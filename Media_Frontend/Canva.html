<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Canva UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <link rel="stylesheet" href="Canva.css">
</head>
<body>

<nav class="navbar px-4 text-white topbar bg-dark"> 
  <div>File &nbsp;&nbsp; Resize &nbsp;&nbsp; ✎ Editing</div>
  <b>Sample</b>
  <div>
    <button class="btn btn-primary rounded-pill">Present</button>
    <button class="btn btn-light rounded-pill ms-2">Share</button>
  </div>
</nav>

<div class="container-fluid app-body">
  <div class="row h-100">

    <div class="col-auto bg-white sidebar border-end p-0">
      <div class="menu d-flex flex-column align-items-center text-center gap-3 pt-3">
        
        <div class="menu-item text-secondary cursor-pointer">
          <i class="bi bi-layout-text-window-reverse fs-3"></i>
          <p class="small mb-0">Templates</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-shape-triangle fs-3"></i>
          <p class="small mb-0">Elements</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-type fs-3"></i>
          <p class="small mb-0">Text</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-award fs-3"></i>
          <p class="small mb-0">Brand</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-cloud-arrow-up fs-3"></i>
          <p class="small mb-0">Uploads</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-tools fs-3"></i>
          <p class="small mb-0">Tools</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-folder2-open fs-3"></i>
          <p class="small mb-0">Projects</p>
        </div>
        
        <div class="menu-item text-secondary">
          <i class="bi bi-grid-3x3-gap fs-3"></i>
          <p class="small mb-0">Apps</p>
        </div>

      </div>
    </div> 

    <div class="col bg-light p-3 side-drawer">
      <div class="form-control rounded-pill mb-3">＋ Describe your ideal design 🎙</div>

      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-outline-secondary w-50">Generate</button>
        <button class="btn btn-purple w-50">Search</button>
      </div>

      <h6 class="mt-4 fw-bold">Recently used</h6>
      <div class="d-flex gap-2 mb-4">
        <div class="thumb">
          <img src="5.jpeg" alt="Image 5" class="img-fluid">
        </div>
        <div class="thumb">
          <img src="7.jpeg" alt="Image 6" class="img-fluid">
        </div>
      </div>

      <h6 class="mt-4 fw-bold">All results</h6>
      
      <div class="d-flex gap-2 mb-3">
        <div class="thumb">
          <img src="9.jpeg" alt="Image 5" class="img-fluid">
        </div>
        <div class="thumb">
          <img src="1.jpeg" alt="Image 6" class="img-fluid">
        </div>
      </div>
      
      <div class="d-flex gap-2 mb-3">
        <div class="thumb">
          <img src="2.jpeg" alt="Image 5" class="img-fluid">
        </div>
        <div class="thumb">
          <img src="3.jpeg" alt="Image 6" class="img-fluid">
        </div>
      </div>
      
      <div class="d-flex gap-2 mb-3">
        <div class="thumb">
          <img src="5.jpeg" alt="Image 5" class="img-fluid">
        </div>
        <div class="thumb">
          <img src="7.jpeg" alt="Image 6" class="img-fluid">
        </div>
      </div>
      
      <div class="d-flex gap-2 mb-3">
        <div class="thumb">
          <img src="8.jpeg" alt="Image 5" class="img-fluid">
        </div>
        <div class="thumb">
          <img src="9.jpeg" alt="Image 6" class="img-fluid">
        </div>
      </div>
    </div>

    <div class="col workspace p-4">

      <div class="toolbar bg-white shadow rounded-pill px-4 py-2 mb-4 mx-auto">
        Edit &nbsp;🔴&nbsp; ☰ &nbsp;Effects &nbsp;| &nbsp;Animate &nbsp;|&nbsp;Position
      </div>

      <div class="canvas bg-white mx-auto shadow-sm">
        <div class="shape circle"></div>
        <div class="shape square"></div>
        <div class="shape triangle"></div>
        <div class="shape pentagon"></div>

        <div class="shape plus"></div>
        <div class="shape parallelogram"></div>
        <div class="shape arrow"></div>

        <div class="heart-border">
          <div class="heart"></div>
        </div>
      </div>

      <div class="bottom-bar">
                <div class="bottom-left">
                    <button><i class="fa-regular fa-note-sticky"></i> Notes</button>
                    <button><i class="fa-regular fa-clock"></i> Timer</button>
                </div>
                <div class="bottom-center">
                    <div class="page-selector">
                        <img src="Screenshot 2026-06-10 140244.png" alt="">
                    </div>
                    <button><i class="fa-solid fa-plus"></i></button>
                    <button><i class="fa-solid fa-chevron-down"></i></button>
                </div>
                <div class="bottom-right">
                    <input type="range" min="10" max="200" value="53">
                    <span>53%</span>
                    <button><i class="fa-regular fa-clone"></i> Pages</button>
                    <span>1 / 1</span>
                    <button><i class="fa-solid fa-table-cells"></i></button>
                    <button><i class="fa-solid fa-expand"></i></button>
                    <button><i class="fa-regular fa-comment"></i></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
