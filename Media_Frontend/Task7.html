<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media Query</title>
        <link rel="stylesheet" href="style.css">
        <style>
    body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
}
.box{
     width:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
  
}
.img{ 
     width:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
}
.img img{
    position:absolute;
    width:420px;
    height:250px;
    border-radius:20px;
    object-fit:cover;
    left:0;
    right:0;
    margin:auto;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    transition:0.5s;
    cursor:pointer;
}
.img:hover img{
    filter:grayscale(100%);
    opacity:0.3;
    transform:scale(0.85);
}
.img img:hover{
    filter:grayscale(0%);
    opacity:1;
    transform:scale(1.1);
    z-index:10;
}
.img1{
    top: 30px;
    width:320px;
    opacity:0.3;
    filter:grayscale(50%);
    z-index:1;
    border-radius:20px;
}
      .img2{
    top:90px;
    width:380px;
    opacity:0.5;
    filter:grayscale(100%);
    z-index:2;
}
   .img3{
    top:200px;
    z-index:5;
}
.img4{
    top:330px;
    width:380px;
    opacity:0.5;
    filter:grayscale(100%);
    z-index:2;
}
.img5{
    top:420px;
    width:320px;
    opacity:0.3;
    filter:grayscale(100%);
    z-index:1;
}
.content{
    text-align:center;
}
.arrow{
    font-size:30px;
    color:blue;
    margin:10px;
    cursor:pointer;
}
.img2:hover{
    z-index:5;
    width:420px;
    transform: scale(2);
}
   </style>
    </head>
    <body>
        <div class="box">
            <div class="img">
                <img src="5.jpeg" class="img1">
                <img src="6.jpeg" class="img2">
                <img src="7.jpeg" class="img3">
                <img src="8.jpeg" class="img4">
                <img src="9.jpeg" class="img5">
            </div>

              <div class="content">
             <div>
                 <span class="arrow">⬆️</span>
                    <span class="arrow">⬇️</span>
               </div>

               <h1>Luffy kun</h1>

               <div class="line"></div>

           <p>MARKETING MANAGER</p>

    </div>

        </div>

    </body>
</html>
